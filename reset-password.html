<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Grocery Mart</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:#f5f7f5; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:16px; padding:40px 36px; max-width:420px; width:90%; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
    .logo { font-size:22px; font-weight:700; color:#1a2e22; margin-bottom:24px; text-align:center; }
    .logo strong { color:#2d6a4f; }
    h2 { font-size:20px; font-weight:700; color:#1a2e22; margin-bottom:6px; }
    p.sub { font-size:14px; color:#888; margin-bottom:24px; }
    label { font-size:13px; font-weight:600; color:#555; display:block; margin-bottom:6px; }
    input { width:100%; padding:12px 14px; border:1.5px solid #ddd; border-radius:10px; font-size:14px; font-family:'Poppins',sans-serif; outline:none; margin-bottom:16px; }
    input:focus { border-color:#2d6a4f; }
    .btn { width:100%; padding:13px; background:#2d6a4f; color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700; font-family:'Poppins',sans-serif; cursor:pointer; }
    .btn:hover { background:#52b788; }
    .btn:disabled { background:#aaa; cursor:not-allowed; }
    .msg { font-size:13px; padding:12px 14px; border-radius:8px; margin-bottom:16px; display:none; }
    .msg.success { background:#e8f5e9; color:#2d6a4f; }
    .msg.error   { background:#fce4ec; color:#c62828; }
    .back { text-align:center; margin-top:16px; font-size:13px; color:#888; }
    .back a { color:#2d6a4f; font-weight:600; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛒 Grocery <strong>Mart</strong></div>

    <!-- Step 1: Enter Email -->
    <div id="stepEmail">
      <h2>Forgot Password?</h2>
      <p class="sub">Enter your registered email and we'll send you a reset link.</p>
      <div id="msgEmail" class="msg"></div>
      <label>Email Address</label>
      <input type="email" id="emailInput" placeholder="your@email.com"/>
      <button class="btn" id="sendBtn" onclick="sendResetLink()">Send Reset Link</button>
      <div class="back"><a href="login.html">← Back to Login</a></div>
    </div>

    <!-- Step 2: Set New Password (shown when token in URL) -->
    <div id="stepReset" style="display:none;">
      <h2>Set New Password</h2>
      <p class="sub">Enter your new password below.</p>
      <div id="msgReset" class="msg"></div>
      <label>New Password</label>
      <input type="password" id="newPassword" placeholder="Minimum 6 characters"/>
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat new password"/>
      <button class="btn" id="resetBtn" onclick="resetPassword()">Reset Password</button>
      <div class="back"><a href="login.html">← Back to Login</a></div>
    </div>
  </div>

  <script>
    var API = 'http://localhost:5000';

    /* Check if reset token in URL */
    var params = new URLSearchParams(window.location.search);
    var token  = params.get('token');
    var email  = params.get('email');

    if (token && email) {
      document.getElementById('stepEmail').style.display = 'none';
      document.getElementById('stepReset').style.display = 'block';
    }

    function showMsg(id, text, type) {
      var el = document.getElementById(id);
      el.textContent   = text;
      el.className     = 'msg ' + type;
      el.style.display = 'block';
    }

    /* Step 1 — Send reset link */
    function sendResetLink() {
      var emailVal = document.getElementById('emailInput').value.trim();
      if (!emailVal) { showMsg('msgEmail', 'Please enter your email.', 'error'); return; }

      var btn = document.getElementById('sendBtn');
      btn.textContent = '⏳ Sending...';
      btn.disabled    = true;

      fetch(API + '/api/auth/forgot-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email: emailVal })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        showMsg('msgEmail', '✅ ' + data.message, 'success');
        btn.textContent = 'Send Reset Link';
        btn.disabled    = false;
      })
      .catch(function() {
        showMsg('msgEmail', '❌ Could not connect to server. Is backend running?', 'error');
        btn.textContent = 'Send Reset Link';
        btn.disabled    = false;
      });
    }

    /* Step 2 — Reset password */
    function resetPassword() {
      var newPass  = document.getElementById('newPassword').value.trim();
      var confPass = document.getElementById('confirmPassword').value.trim();

      if (newPass.length < 6) { showMsg('msgReset', 'Password must be at least 6 characters.', 'error'); return; }
      if (newPass !== confPass) { showMsg('msgReset', 'Passwords do not match.', 'error'); return; }

      var btn = document.getElementById('resetBtn');
      btn.textContent = '⏳ Resetting...';
      btn.disabled    = true;

      fetch(API + '/api/auth/reset-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ token: token, email: email, password: newPass })
      })
      .then(function(res) { return res.json(); })
      .then(function(data) {
        if (data.message && data.message.includes('successfully')) {
          showMsg('msgReset', '✅ ' + data.message, 'success');
          setTimeout(function() { window.location.href = 'login.html'; }, 2000);
        } else {
          showMsg('msgReset', '❌ ' + data.message, 'error');
          btn.textContent = 'Reset Password';
          btn.disabled    = false;
        }
      })
      .catch(function() {
        showMsg('msgReset', '❌ Server error. Please try again.', 'error');
        btn.textContent = 'Reset Password';
        btn.disabled    = false;
      });
    }
  </script>
</body>
</html>
