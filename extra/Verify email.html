<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Email — Grocery Mart</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Poppins',sans-serif; background:#f5f7f5; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:#fff; border-radius:20px; padding:48px 40px; max-width:440px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.08); text-align:center; }
    .icon { font-size:64px; margin-bottom:20px; }
    .logo { font-size:18px; font-weight:700; color:#1a2e22; margin-bottom:28px; }
    .logo strong { color:#2d6a4f; }
    h2 { font-size:22px; font-weight:700; color:#1a2e22; margin-bottom:10px; }
    p  { font-size:14px; color:#777; line-height:1.7; margin-bottom:20px; }
    .btn {
      display:inline-block; padding:13px 32px; border-radius:10px;
      font-size:15px; font-weight:700; font-family:'Poppins',sans-serif;
      cursor:pointer; text-decoration:none; border:none; transition:opacity 0.2s;
    }
    .btn-green { background:#2d6a4f; color:#fff; }
    .btn-green:hover { opacity:0.88; }
    .btn-outline { background:#fff; color:#2d6a4f; border:2px solid #2d6a4f; margin-top:10px; }
    .btn-outline:hover { background:#f0f7f0; }
    .spinner { width:48px; height:48px; border:4px solid #e0e0e0; border-top-color:#2d6a4f; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg-box { padding:14px 18px; border-radius:10px; font-size:14px; font-weight:600; margin-bottom:20px; }
    .msg-success { background:#e8f5e9; color:#2d6a4f; }
    .msg-error   { background:#fce4ec; color:#c62828; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🛒 Grocery <strong>Mart</strong></div>

  <!-- Loading state -->
  <div id="stateLoading">
    <div class="spinner"></div>
    <h2>Verifying your email...</h2>
    <p>Please wait a moment.</p>
  </div>

  <!-- Success state -->
  <div id="stateSuccess" style="display:none;">
    <div class="icon">✅</div>
    <h2>Email Verified!</h2>
    <p>Your account is now active. You're being logged in automatically...</p>
    <a href="index.html" class="btn btn-green">Go to Store →</a>
  </div>

  <!-- Error state -->
  <div id="stateError" style="display:none;">
    <div class="icon">❌</div>
    <h2>Verification Failed</h2>
    <div class="msg-box msg-error" id="errorMsg">Link is invalid or has expired.</div>
    <p>Request a new verification link below.</p>
    <input type="email" id="resendEmail" placeholder="Enter your email"
      style="width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:'Poppins',sans-serif;outline:none;margin-bottom:12px;"/>
    <button class="btn btn-green" onclick="resendVerification()" style="width:100%;">Resend Verification Email</button>
    <br/>
    <a href="login.html" class="btn btn-outline" style="display:block;margin-top:10px;">← Back to Login</a>
  </div>
</div>

<script>
  var API   = 'http://localhost:5000';
  var token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    showError('No verification token found. Please use the link from your email.');
  } else {
    fetch(API + '/api/auth/verify-email?token=' + token)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          /* Save session and redirect */
          localStorage.setItem('token',        data.token);
          localStorage.setItem('loggedInUser', data.user.name);
          localStorage.setItem('userEmail',    data.user.email);
          localStorage.setItem('userId',       data.user.id);
          localStorage.setItem('isAdmin',      data.user.role === 'admin' ? 'true' : 'false');
          showSuccess();
          setTimeout(function() { window.location.href = 'index.html'; }, 2000);
        } else {
          showError(data.message || 'Verification failed.');
        }
      })
      .catch(function() {
        showError('Could not connect to server. Make sure the backend is running.');
      });
  }

  function showSuccess() {
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('stateSuccess').style.display = 'block';
  }

  function showError(msg) {
    document.getElementById('stateLoading').style.display = 'none';
    document.getElementById('stateError').style.display   = 'block';
    document.getElementById('errorMsg').textContent        = msg;
  }

  function resendVerification() {
    var email = document.getElementById('resendEmail').value.trim();
    if (!email) { alert('Please enter your email address.'); return; }
    fetch(API + '/api/auth/resend-verification', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email: email })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) { alert(data.message); })
    .catch(function() { alert('Could not connect to server.'); });
  }
</script>
</body>
</html>
